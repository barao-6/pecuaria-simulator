<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#050e04">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Pecuária Sim">
<meta name="description" content="Simulador online de pecuária. Gerencie sua fazenda, compre e venda gado, compita no ranking global.">
<link rel="manifest" href="manifest.json">
<title>Pecuária Simulator — Online</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --glass:rgba(10,20,8,0.72);--glass2:rgba(15,30,10,0.88);--glass3:rgba(20,40,14,0.60);
  --border:rgba(80,200,60,0.18);--border2:rgba(80,200,60,0.35);
  --green:#3ecf18;--gbg:rgba(62,207,24,0.15);--gt:#6eff3a;
  --red:#e03030;--rbg:rgba(224,48,48,0.18);--rt:#ff5555;
  --amber:#d08000;--abg:rgba(208,128,0,0.18);--at:#ffb020;
  --blue:#1870d0;--bbg:rgba(24,112,208,0.18);--bt:#48aaff;
  --purple:#7040d0;--pubg:rgba(112,64,208,0.18);--put:#b080ff;
  --teal:#10a080;--tbg:rgba(16,160,128,0.18);--tt:#30d8a8;
  --gold:#c89000;--gobg:rgba(200,144,0,0.18);--got:#ffc820;
  --text:#f0ffe8;--text2:#a8d898;--text3:#608050;
  --r:12px;--rl:18px;
  --font:'Segoe UI',system-ui,sans-serif;
  --sb:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;overflow:hidden;background:#050e04}
body{font-family:var(--font);font-size:14px;color:var(--text)}

/* ── BG LAYER ── */
#bg-layer{position:fixed;inset:0;z-index:0;overflow:hidden}
#bg-layer::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(5,14,4,.6) 0%,rgba(5,14,4,.9) 100%)}
#bg-main{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:.45;transition:opacity 1s}

/* ══════════════════════════════════════════════
   AUTH SCREEN
══════════════════════════════════════════════ */
#auth-screen{
  position:fixed;inset:0;z-index:1000;
  display:flex;align-items:center;justify-content:center;
  padding:20px;
}
.auth-card{
  width:100%;max-width:400px;
  background:rgba(10,22,8,.94);
  backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);
  border:1px solid var(--border2);
  border-radius:24px;
  overflow:hidden;
  box-shadow:0 24px 80px rgba(0,0,0,.7),0 0 0 1px rgba(62,207,24,.08);
}
.auth-hero{
  position:relative;height:160px;overflow:hidden;
  background:linear-gradient(135deg,#0a2010,#0d3818);
}
.auth-hero-img{width:100%;height:100%;object-fit:cover;opacity:.5}
.auth-hero-overlay{position:absolute;inset:0;background:linear-gradient(0deg,rgba(10,22,8,.95) 0%,transparent 60%)}
.auth-logo{position:absolute;bottom:14px;left:20px;right:20px}
.auth-logo-title{font-size:22px;font-weight:900;color:var(--gt);letter-spacing:.08em;text-shadow:0 0 20px rgba(110,255,58,.4)}
.auth-logo-title em{color:var(--at);font-style:normal}
.auth-logo-sub{font-size:11px;color:var(--text2);margin-top:2px;letter-spacing:.04em}
.auth-body{padding:20px}
.auth-tabs{display:flex;gap:6px;margin-bottom:20px;background:rgba(255,255,255,.06);border-radius:var(--r);padding:4px}
.auth-tab{flex:1;padding:9px;text-align:center;font-size:13px;font-weight:600;border-radius:9px;cursor:pointer;transition:all .2s;color:var(--text3)}
.auth-tab.on{background:var(--gbg);color:var(--gt);box-shadow:0 2px 12px rgba(62,207,24,.2)}
.auth-form{display:flex;flex-direction:column;gap:12px}
.inp-wrap{position:relative}
.inp-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:16px;pointer-events:none;z-index:1}
.auth-input{
  width:100%;padding:12px 12px 12px 38px;
  background:rgba(255,255,255,.07);
  border:1px solid var(--border);
  border-radius:var(--r);color:var(--text);font-family:var(--font);font-size:14px;
  transition:border-color .2s,background .2s;outline:none;
}
.auth-input:focus{border-color:var(--green);background:rgba(62,207,24,.08)}
.auth-input::placeholder{color:var(--text3)}
.auth-btn{
  width:100%;padding:14px;
  background:linear-gradient(135deg,rgba(62,207,24,.3),rgba(40,180,10,.25));
  border:1px solid var(--green);border-radius:var(--r);
  color:var(--gt);font-size:15px;font-weight:800;
  cursor:pointer;letter-spacing:.04em;transition:all .2s;
  text-shadow:0 0 10px rgba(110,255,58,.3);
  box-shadow:0 4px 20px rgba(62,207,24,.15);
}
.auth-btn:hover{background:linear-gradient(135deg,rgba(62,207,24,.4),rgba(40,180,10,.35));box-shadow:0 4px 28px rgba(62,207,24,.3)}
.auth-btn:active{transform:scale(.97)}
.auth-divider{text-align:center;font-size:11px;color:var(--text3);margin:4px 0}
.auth-link{color:var(--bt);font-size:12px;text-align:center;cursor:pointer;margin-top:4px;text-decoration:underline}
.auth-error{background:var(--rbg);border:0.5px solid var(--red);border-radius:var(--r);padding:10px 12px;font-size:12px;color:var(--rt);display:none}
.auth-error.show{display:block}
.auth-success{background:var(--gbg);border:0.5px solid var(--green);border-radius:var(--r);padding:10px 12px;font-size:12px;color:var(--gt);display:none}
.auth-success.show{display:block}
.remember-row{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text2);cursor:pointer}
.remember-row input{accent-color:var(--green);width:15px;height:15px}
.auth-footer{text-align:center;font-size:10px;color:var(--text3);padding:12px 20px;border-top:0.5px solid var(--border)}
.avatar-ring{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--green),var(--teal));display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;flex-shrink:0}

/* ══════════════════════════════════════════════
   PROFILE POPUP
══════════════════════════════════════════════ */
#profile-popup{
  position:fixed;inset:0;z-index:400;display:none;
  align-items:flex-start;justify-content:center;padding:60px 10px 10px;
}
#profile-popup.open{display:flex}
.profile-card{
  width:100%;max-width:480px;
  background:rgba(10,22,8,.96);backdrop-filter:blur(28px);
  border:1px solid var(--border2);border-radius:20px;overflow:hidden;
  max-height:85vh;overflow-y:auto;
  box-shadow:0 20px 60px rgba(0,0,0,.8)
}
.profile-hero{
  background:linear-gradient(135deg,rgba(62,207,24,.15),rgba(16,160,128,.1));
  padding:20px;border-bottom:0.5px solid var(--border);
  display:flex;align-items:center;gap:14px
}
.profile-avatar-big{width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,var(--green),var(--teal));display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:800;flex-shrink:0;border:2px solid var(--green);box-shadow:0 0 20px rgba(62,207,24,.3)}
.profile-badges{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.badge{font-size:10px;padding:3px 8px;border-radius:20px;font-weight:700;border:0.5px solid}
.badge-gold{background:var(--gobg);color:var(--got);border-color:var(--gold)}
.badge-green{background:var(--gbg);color:var(--gt);border-color:var(--green)}
.badge-blue{background:var(--bbg);color:var(--bt);border-color:var(--blue)}
.badge-purple{background:var(--pubg);color:var(--put);border-color:var(--purple)}
.profile-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:14px}
.pstat{background:rgba(255,255,255,.06);border:0.5px solid var(--border);border-radius:var(--r);padding:10px;text-align:center}
.pstat-v{font-size:17px;font-weight:800}
.pstat-l{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;margin-top:2px}

/* ══════════════════════════════════════════════
   RANKING ONLINE PANEL
══════════════════════════════════════════════ */
.rank-online-item{
  display:flex;align-items:center;gap:10px;
  padding:10px 12px;background:rgba(255,255,255,.06);
  border-radius:var(--r);margin-bottom:6px;
  border:0.5px solid var(--border);
  transition:all .2s
}
.rank-online-item.me{border-color:var(--green);background:rgba(62,207,24,.08)}
.rank-online-item.top1{border-color:var(--gold);background:rgba(200,144,0,.08)}
.rank-pos-num{font-size:16px;font-weight:900;width:32px;text-align:center}
.rank-flag{font-size:18px}
.rank-info{flex:1;min-width:0}
.rank-name{font-weight:700;font-size:13px}
.rank-farm{font-size:10px;color:var(--text2);margin-top:1px}
.rank-value{text-align:right}
.rank-score{font-weight:800;font-size:14px}
.rank-change{font-size:10px;margin-top:1px}
.rank-up{color:var(--gt)}.rank-dn{color:var(--rt)}.rank-eq{color:var(--text3)}
.rank-filter-row{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;margin-bottom:10px;padding-bottom:2px}
.rank-filter-row::-webkit-scrollbar{display:none}
.rfbtn{font-size:11px;padding:5px 12px;border-radius:20px;white-space:nowrap;border:0.5px solid var(--border2);background:rgba(255,255,255,.06);color:var(--text2);cursor:pointer;flex-shrink:0;transition:all .15s}
.rfbtn.on{background:var(--gbg);color:var(--gt);border-color:var(--green)}
.online-dot{width:8px;height:8px;border-radius:50%;background:var(--green);display:inline-block;box-shadow:0 0 6px var(--gt);animation:pulse-dot 2s infinite}
@keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:.4}}
.server-info{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text2);padding:6px 10px;background:rgba(62,207,24,.08);border-radius:var(--r);margin-bottom:10px;border:0.5px solid var(--border)}

/* ══════════════════════════════════════════════
   JORNAL DO AGRO — REAL-TIME
══════════════════════════════════════════════ */
.news-card{
  background:rgba(255,255,255,.06);border:0.5px solid var(--border);
  border-radius:var(--rl);overflow:hidden;margin-bottom:10px;
  transition:all .2s
}
.news-card.high-impact{border-color:var(--amber);background:rgba(208,128,0,.08)}
.news-card.critical{border-color:var(--red);background:rgba(224,48,48,.08);animation:news-pulse 2s infinite}
@keyframes news-pulse{0%,100%{box-shadow:none}50%{box-shadow:0 0 16px rgba(224,48,48,.3)}}
.news-photo{width:100%;height:100px;object-fit:cover}
.news-body{padding:12px}
.news-meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.news-tag{font-size:9px;padding:2px 7px;border-radius:20px;font-weight:700;text-transform:uppercase;letter-spacing:.04em}
.news-time{font-size:10px;color:var(--text3)}
.news-title{font-size:14px;font-weight:800;margin-bottom:5px;line-height:1.3}
.news-summary{font-size:12px;color:var(--text2);line-height:1.5;margin-bottom:8px}
.news-impact{display:flex;align-items:center;gap:6px;font-size:11px;padding:6px 10px;background:rgba(255,255,255,.05);border-radius:var(--r)}
.impact-chip{font-size:10px;padding:2px 7px;border-radius:12px;font-weight:700}
.impact-pos{background:rgba(62,207,24,.2);color:var(--gt)}
.impact-neg{background:rgba(224,48,48,.2);color:var(--rt)}
.impact-neu{background:rgba(255,255,255,.1);color:var(--text2)}
.news-ai-badge{font-size:9px;color:var(--bt);padding:2px 6px;background:rgba(24,112,208,.15);border-radius:8px;border:0.5px solid rgba(24,112,208,.3)}
.news-loading{display:flex;align-items:center;justify-content:center;gap:10px;padding:24px;color:var(--text2);font-size:13px}
.spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--gt);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ══════════════════════════════════════════════
   MARKET LIVE PANEL
══════════════════════════════════════════════ */
.mkt-live-header{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.live-badge{background:rgba(224,48,48,.2);color:var(--rt);border:0.5px solid var(--red);font-size:10px;padding:3px 8px;border-radius:20px;font-weight:700;letter-spacing:.05em;display:flex;align-items:center;gap:4px}
.mkt-item-pro{
  display:flex;align-items:center;gap:10px;padding:12px;
  background:rgba(255,255,255,.06);border-radius:var(--r);margin-bottom:7px;
  border:0.5px solid var(--border);position:relative;overflow:hidden
}
.mkt-item-pro::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:2px 0 0 2px}
.mkt-item-pro.up::before{background:var(--green)}
.mkt-item-pro.dn::before{background:var(--red)}
.mkt-chart-mini{display:flex;align-items:flex-end;gap:2px;height:28px}
.mkt-bar{width:5px;border-radius:2px 2px 0 0;transition:height .3s}
.mkt-ref{font-size:10px;color:var(--text3);margin-top:2px}
.mkt-ai-note{font-size:11px;color:var(--bt);padding:8px 12px;background:rgba(24,112,208,.08);border-radius:var(--r);border:0.5px solid rgba(24,112,208,.2);margin-top:8px}

/* ══════════════════════════════════════════════
   CLOUD SAVE STATUS
══════════════════════════════════════════════ */
.cloud-status{display:flex;align-items:center;gap:6px;font-size:10px;padding:5px 10px;border-radius:20px;background:rgba(255,255,255,.07);cursor:pointer}
.cloud-ok{color:var(--gt)}.cloud-sync{color:var(--at)}.cloud-err{color:var(--rt)}

/* ══════════════════════════════════════════════
   TOPBAR ONLINE
══════════════════════════════════════════════ */
#topbar{background:rgba(15,30,10,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border2);padding:8px 12px;flex-shrink:0;display:flex;align-items:center;gap:8px;position:relative;z-index:10}
.logo{font-size:14px;font-weight:900;color:var(--gt);letter-spacing:.06em;white-space:nowrap;flex-shrink:0;text-shadow:0 0 14px rgba(110,255,58,.3)}
.logo em{color:var(--at);font-style:normal}
#hud-row{display:flex;gap:5px;flex:1;overflow-x:auto;scrollbar-width:none}
#hud-row::-webkit-scrollbar{display:none}
.hc{background:rgba(255,255,255,.07);border:0.5px solid var(--border);border-radius:8px;padding:5px 9px;text-align:center;flex-shrink:0;min-width:58px;transition:all .2s}
.hc-v{font-size:12px;font-weight:800;line-height:1.2;white-space:nowrap}
.hc-l{font-size:8px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em}
.topbar-right{display:flex;align-items:center;gap:7px;flex-shrink:0}

/* ══════════════════════════════════════════════
   WEATHER / CONTENT / BNAV
══════════════════════════════════════════════ */
#wstrip{padding:5px 14px;background:rgba(5,14,4,.75);backdrop-filter:blur(12px);border-bottom:0.5px solid var(--border);display:flex;align-items:center;gap:8px;font-size:12px;flex-shrink:0;overflow-x:auto;scrollbar-width:none;z-index:9;position:relative}
#wstrip::-webkit-scrollbar{display:none}
.spill{font-size:10px;padding:2px 8px;border-radius:20px;background:rgba(255,255,255,.08);color:var(--text2);white-space:nowrap;flex-shrink:0;margin-left:auto}
#content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:10px 10px calc(70px + var(--sb));position:relative;z-index:1}
#bnav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(15,30,10,.94);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-top:1px solid var(--border2);display:flex;padding-bottom:var(--sb)}
.bn{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 2px 6px;cursor:pointer;color:var(--text3);font-size:9px;letter-spacing:.03em;text-transform:uppercase;border:none;background:transparent;transition:all .2s;position:relative}
.bn.on{color:var(--gt);text-shadow:0 0 10px var(--gt)}
.bn svg{width:22px;height:22px;margin-bottom:2px;transition:filter .2s}
.bn.on svg{filter:drop-shadow(0 0 5px var(--gt))}

/* ══════════════════════════════════════════════
   GAME PANELS
══════════════════════════════════════════════ */
.panel{display:none}.panel.on{display:block}
.card{background:rgba(10,20,8,.72);backdrop-filter:blur(16px);border:0.5px solid var(--border);border-radius:18px;padding:14px;margin-bottom:10px;overflow:hidden;position:relative}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(110,255,58,.2),transparent)}
.card-title{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;gap:8px}
button{font-family:var(--font);font-size:13px;padding:10px 14px;border:0.5px solid var(--border2);border-radius:12px;background:rgba(255,255,255,.07);color:var(--text);cursor:pointer;transition:all .18s;touch-action:manipulation;backdrop-filter:blur(8px)}
button:hover{background:rgba(255,255,255,.12)}
button:active{transform:scale(.94)}
button:disabled{opacity:.3;pointer-events:none}
.bf{width:100%;padding:12px;font-size:13px;font-weight:700}
.bp{background:rgba(62,207,24,.2);border-color:var(--green);color:var(--gt)}
.bb{background:rgba(24,112,208,.2);border-color:var(--blue);color:var(--bt)}
.ba{background:rgba(208,128,0,.2);border-color:var(--amber);color:var(--at)}
.br{background:rgba(224,48,48,.2);border-color:var(--red);color:var(--rt)}
.bu{background:rgba(112,64,208,.2);border-color:var(--purple);color:var(--put)}
.bg2{background:rgba(200,144,0,.2);border-color:var(--gold);color:var(--got)}
.bt2{background:rgba(16,160,128,.2);border-color:var(--teal);color:var(--tt)}
.ar{display:grid;gap:8px;margin-bottom:10px}
.ar3{grid-template-columns:repeat(3,1fr)}.ar2{grid-template-columns:repeat(2,1fr)}.ar4{grid-template-columns:repeat(4,1fr)}
.chip{font-size:10px;padding:3px 9px;border-radius:20px;font-weight:700;display:inline-block;white-space:nowrap}
.cok{background:rgba(62,207,24,.2);color:var(--gt);border:0.5px solid rgba(62,207,24,.3)}
.cw{background:rgba(208,128,0,.2);color:var(--at);border:0.5px solid rgba(208,128,0,.3)}
.ce{background:rgba(224,48,48,.2);color:var(--rt);border:0.5px solid rgba(224,48,48,.3)}
.cb{background:rgba(24,112,208,.2);color:var(--bt);border:0.5px solid rgba(24,112,208,.3)}
.cpu{background:rgba(112,64,208,.2);color:var(--put);border:0.5px solid rgba(112,64,208,.3)}
.ct{background:rgba(16,160,128,.2);color:var(--tt);border:0.5px solid rgba(16,160,128,.3)}
.cgo{background:rgba(200,144,0,.2);color:var(--got);border:0.5px solid rgba(200,144,0,.3)}
.mg{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:10px}
.mg3{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:10px}
.mg4{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:10px}
.mc{background:rgba(255,255,255,.06);border:0.5px solid var(--border);border-radius:var(--r);padding:10px 12px;backdrop-filter:blur(8px)}
.mc-l{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px}
.mc-v{font-size:18px;font-weight:800;line-height:1.2}
.mc-s{font-size:11px;color:var(--text2);margin-top:2px}
.pw{height:5px;background:rgba(255,255,255,.1);border-radius:3px;overflow:hidden}
.pf{height:100%;border-radius:3px;transition:width .4s}
.cvg{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px}
@media(min-width:420px){.cvg{grid-template-columns:repeat(4,1fr)}}
@media(min-width:600px){.cvg{grid-template-columns:repeat(5,1fr)}}
.cwc{border-radius:18px;border:1px solid rgba(255,255,255,.1);cursor:pointer;overflow:hidden;position:relative;transition:all .2s;background:rgba(0,0,0,.3);aspect-ratio:.85}
.cwc:active{transform:scale(.93)}
.cwc.sel{border-color:var(--green);box-shadow:0 0 0 2px var(--green),0 4px 20px rgba(62,207,24,.3)}
.cwc.sick{border-color:var(--red);box-shadow:0 0 0 1px var(--red)}
.cwc.preg{border-color:var(--purple)}
.cwc-photo{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.cwc-overlay{position:absolute;inset:0;background:linear-gradient(0deg,rgba(0,0,0,.85) 0%,rgba(0,0,0,.1) 55%,transparent 100%)}

function setBackendState(nextState) {

function initFirebaseBackend() {
  const hasConfig = !!firebaseConfig?.apiKey && firebaseConfig.apiKey !== FIREBASE_PLACEHOLDER_KEY;
  BACKEND_STATE.requested = hasConfig;

  if (!hasConfig) {
    setBackendState({
      ready: false,
      mode: 'local',
      reason: 'not-configured',
      message: 'Firebase não configurado. Modo local ativo neste dispositivo.'
    });
    return;
  }

  if (!window.firebase || typeof window.firebase.initializeApp !== 'function') {
    setBackendState({
      ready: false,
      mode: 'local',
      reason: 'sdk-missing',
      message: 'Servidor indisponível para autenticação e nuvem. Modo local ativo neste dispositivo.'
    });
    return;
  }

  try {
    _fbApp = window.firebase.apps?.length ? window.firebase.app() : window.firebase.initializeApp(firebaseConfig);
    _fbAuth = window.firebase.auth();
    _fbDb = window.firebase.firestore();
    setBackendState({ ready: true, mode: 'cloud', reason: '', message: '' });
  } catch (error) {
    console.warn('Firebase init error:', error);
    _fbApp = null;
    _fbAuth = null;
    _fbDb = null;
    setBackendState({
      ready: false,
      mode: 'local',
      reason: 'init-failed',
      message: 'Servidor indisponível para autenticação e nuvem. Modo local ativo neste dispositivo.'
    });
  }
}

function notifyBackendFallback(force = false) {

  if (typeof toast === 'function' && document.getElementById('shell')?.style.display !== 'none') {
    toast(msg, 'warn');

  console.warn(msg);
}

function normalizeSearchText(value = '') {
  return String(value || '')
    .normalize('NFD')
    .replace(/[\u0300-\u036f]/g, '')
    .toLowerCase()
    .trim()
    .replace(/\s+/g, ' ');
}

function buildSearchTerms(username = '', farmName = '') {
  const terms = new Set();
  const values = [username, farmName].map(normalizeSearchText).filter(Boolean);

  values.forEach(value => {
    const compact = value.replace(/\s+/g, '');
    for (let i = 2; i <= Math.min(compact.length, 24); i++) {
      terms.add(compact.slice(0, i));
    }

    value.split(' ').filter(token => token.length >= 2).forEach(token => {
      for (let i = 2; i <= Math.min(token.length, 24); i++) {
        terms.add(token.slice(0, i));
      }
    });
  });

  return Array.from(terms).slice(0, 80);
}

function buildUserSearchFields(username = '', farmName = '') {
  return {
    username_lower: normalizeSearchText(username).replace(/\s+/g, ''),
    farmName_lower: normalizeSearchText(farmName),
    searchTerms: buildSearchTerms(username, farmName)
  };
}

async function ensureUserSearchFields(uid, profile = {}) {
  if (!backendIsReady() || !uid) return profile;

  const normalized = buildUserSearchFields(profile.username || '', profile.farmName || '');
  const currentTerms = Array.isArray(profile.searchTerms) ? profile.searchTerms : [];
  const needsUpdate =
    profile.username_lower !== normalized.username_lower ||
    profile.farmName_lower !== normalized.farmName_lower ||
    normalized.searchTerms.some(term => !currentTerms.includes(term));

  if (needsUpdate) {
    await _col.users().doc(uid).set(normalized, { merge: true });
  }

  return { ...profile, ...normalized };
}

function ensureGlobalValue(name, fallback) {
  if (typeof globalThis[name] === 'undefined') {
    globalThis[name] = typeof fallback === 'function' ? fallback() : fallback;
  }
  return globalThis[name];
}

function ensureGlobalFunction(name, impl) {
  if (typeof globalThis[name] !== 'function') {
    globalThis[name] = impl;
  }
  return globalThis[name];
}

function safeCall(name, ...args) {
  const fn = globalThis[name];
  if (typeof fn !== 'function') return undefined;
  try {
    return fn(...args);
  } catch (error) {
    console.warn(name + ' error:', error);
    return undefined;
  }
}

  }
  if ((kind === 'error' || kind === 'success') && !errorBox && !successBox) {
    console[kind === 'error' ? 'error' : 'info'](message);
  }
}

ensureGlobalFunction('_hashPass', function(value) {
  const input = String(value || '');
  let hash = 0;
  for (let i = 0; i < input.length; i += 1) {
    hash = (hash * 31 + input.charCodeAt(i)) >>> 0;
  }
  return 'h' + hash.toString(16);
});

// ═══════════════════════════════════════════════════════════
//  RATE LIMITING — anti-spam de cadastro e login
// ═══════════════════════════════════════════════════════════
const _rateLimit = {
  // Tentativas por ação: { action: [timestamps] }
  _store: {},

  // Verificar se ação está bloqueada
  // maxAttempts = nº máximo em windowMs milissegundos
  check(action, maxAttempts = 5, windowMs = 60_000) {
    const now = Date.now();
    if(!this._store[action]) this._store[action] = [];
    // Limpar tentativas fora da janela
    this._store[action] = this._store[action].filter(t => now - t < windowMs);
    if(this._store[action].length >= maxAttempts){
      const oldest = this._store[action][0];
      const waitSec = Math.ceil((windowMs - (now - oldest)) / 1000);
      throw { message: `Muitas tentativas. Aguarde ${waitSec}s antes de tentar novamente.` };
    }
    this._store[action].push(now);
    return true;
  },

  // Resetar contador (ex: após login bem-sucedido)
  reset(action){ this._store[action] = []; },

  // Quantidade de tentativas restantes
  remaining(action, max = 5, windowMs = 60_000){
    const now = Date.now();
    const attempts = (this._store[action]||[]).filter(t => now-t < windowMs);
    return Math.max(0, max - attempts.length);
  }
};

async function fbRegister(email, password, username, farmName, region) {
  requireBackend();
  const searchFields = buildUserSearchFields(username, farmName);
  const existingUser = await _col.users()
    .where('username_lower', '==', searchFields.username_lower)
    .limit(1)
    .get();

  if (!existingUser.empty) {
    throw { message: 'Usuário já em uso.' };
  }

  const cred = await _fbAuth.createUserWithEmailAndPassword(email, password);
  const uid = cred.user.uid;
  const profile = {
    uid,
    username,
    farmName,
    email,
    region,
    ...searchFields,
    avatar: (farmName[0] || 'F').toUpperCase(),
    level: 1,
    xp: 0,
    patrimonio: 0,
    leite: 0,
    rebanho: 0,
    vendas: 0,
    genetica: 0,
    createdAt: serverTimestamp(),
  };

  await _col.users().doc(uid).set(profile, { merge: true });
  return { id: uid, ...profile };
}

//  AUTH: LOGIN
// ─────────────────────────────────────────────────────────
async function fbLogin(emailOrUser, password) {
  requireBackend();
  let email = String(emailOrUser || '').trim();

  if (!email.includes('@')) {
    const normalizedUser = normalizeSearchText(email).replace(/\s+/g, '');
    const snap = await _col.users()
      .where('username_lower', '==', normalizedUser)
      .limit(1)
      .get();

    if (snap.empty) {
      throw { message: 'Usuário não encontrado. Use seu e-mail ou username cadastrado.' };
    }
    email = snap.docs[0].data().email;
  }

  const cred = await _fbAuth.signInWithEmailAndPassword(email, password);
  const uid = cred.user.uid;
  const snap = await _col.users().doc(uid).get();
  let data = snap.exists ? snap.data() : {
    uid,
    username: cred.user.email.split('@')[0],
    farmName: 'Minha Fazenda',
    email: cred.user.email,
    region: 'BR',
    avatar: (cred.user.email?.[0] || 'F').toUpperCase()
  };

  if (data.banned) {
    await _fbAuth.signOut();
    throw { message: 'Conta bloqueada.' };
  }

  data = await ensureUserSearchFields(uid, data);
  if (!snap.exists) {
    await _col.users().doc(uid).set({
      uid,
      ...data,
      createdAt: serverTimestamp(),
    }, { merge: true });
  }

  return { id: uid, uid, ...data };
}

async function fbSave(uid, gameData) {
  requireBackend();
  const money = gameData.money || 0;
  const day = gameData.day || 1;
  const cows = gameData.cows || [];

  if (money > 50_000_000) throw { message: 'Save inválido: capital impossível' };
  if (day > 36500) throw { message: 'Save inválido: dias impossível' };
  if (cows.length > 500) throw { message: 'Save inválido: rebanho impossível' };
  if (cows.some(c => c.gen > 100)) throw { message: 'Save inválido: genética impossível' };

  const clean = {
    ...gameData,
    cows: cows.map(c => { const { photo, ...rest } = c; return rest; }),
    pqs: (gameData.pqs || []).map(p => { const { photo, ...rest } = p; return rest; }),
    version: 6,
  };

  const compressed = await _compressSave(clean);
  await _col.saves().doc(uid).set({
    ...compressed,
    savedAt: serverTimestamp(),
  });
}

async function fbGetRanking(field = 'patrimonio', reset = false) {
  requireBackend();
  const rankField = getRankingField(field);
  const pageState = getRankPageState(field);

  if (reset) {
    pageState.cursor = null;
    pageState.hasMore = false;
  }

  try {
    let query = _col.ranking()
      .orderBy(rankField, 'desc')
      .orderBy(firebase.firestore.FieldPath.documentId(), 'asc')
      .limit(RANK_PAGE_SIZE);

    if (pageState.cursor) {
      query = query.startAfter(pageState.cursor);
    }

    const snap = await query.get();
    pageState.hasMore = snap.docs.length === RANK_PAGE_SIZE;
    pageState.cursor = snap.docs.length ? snap.docs[snap.docs.length - 1] : null;
    _rankHasMore = pageState.hasMore;
    return snap.docs.map(d => ({ id: d.id, ...d.data() }));
  } catch (error) {
    _rankHasMore = false;
    pageState.hasMore = false;
    if (isFirestoreIndexError(error)) {
      throw rankingIndexError(rankField);
    }
    throw error;
  }
}

async function fbGetRankingNextPage(field = 'patrimonio') {
  if (!_rankHasMore || _rankLoading) return [];
  return fbGetRanking(field, false);
}

async function fbSearchPlayers(query) {
  requireBackend();
  const normalized = normalizeSearchText(query);
  const compact = normalized.replace(/\s+/g, '');
  if (compact.length < 2) return [];

  const usernamePromise = _col.users()
    .orderBy('username_lower')
    .startAt(compact)
    .endAt(compact + '\uf8ff')
    .limit(8)
    .get();

  const farmPromise = _col.users()
    .orderBy('farmName_lower')
    .startAt(normalized)
    .endAt(normalized + '\uf8ff')
    .limit(8)
    .get();

  const searchTermPromise = _col.users()
    .where('searchTerms', 'array-contains', compact)
    .limit(8)
    .get();

  const [usernameSnap, farmSnap, searchTermSnap] = await Promise.all([
    usernamePromise,
    farmPromise,
    searchTermPromise
  ]);

  const hits = new Map();
  [usernameSnap, farmSnap, searchTermSnap].forEach(snap => {
    snap.docs.forEach(doc => {
      hits.set(doc.id, { id: doc.id, ...doc.data() });
    });
  });

  return Array.from(hits.values())
    .map(player => {
      const usernameLower = player.username_lower || normalizeSearchText(player.username).replace(/\s+/g, '');
      const farmLower = player.farmName_lower || normalizeSearchText(player.farmName || player.farm || '');
      const searchTerms = Array.isArray(player.searchTerms) ? player.searchTerms : [];
      let score = 0;
      if (usernameLower === compact) score += 300;
      if (usernameLower.startsWith(compact)) score += 200;
      if (farmLower.startsWith(normalized)) score += 120;
      if (searchTerms.includes(compact)) score += 80;
      return { ...player, _score: score };
    })
    .filter(player => player._score > 0)
    .sort((a, b) => b._score - a._score || (a.username || '').localeCompare(b.username || '', 'pt-BR'))
    .slice(0, 12)
    .map(({ _score, ...player }) => player);
}

async function doLogin() {
  authClear();
  const userVal = getFieldValue('li-user', true);
  const pass = getFieldValue('li-pass');
  if (!userVal || !pass) { authError('Preencha todos os campos.'); return; }

  try { _rateLimit.check('login', 5, 60_000); }
  catch (e) { authError(e.message); return; }

  authLoading(true);
  try {
    if (_fbConfigured) {
      _authResolved = true;
      const user = await fbLogin(userVal, pass);
      CURRENT_USER = user;
      authLoading(false);
      _rateLimit.reset('login');
      loginSuccess(user);
      return;
    }

    const users = _localUsers();
    const normalizedUser = normalizeSearchText(userVal).replace(/\s+/g, '');
    const normalizedEmail = normalizeSearchText(userVal);
    const found = users.find(u =>
      normalizeSearchText(u.username).replace(/\s+/g, '') === normalizedUser ||
      normalizeSearchText(u.email) === normalizedEmail
    );

    if (!found) {
      authError(
        backendNeedsNotice()
          ? backendFallbackMessage() + ' Use uma conta local deste dispositivo ou aguarde o backend voltar.'
          : 'Usuário não encontrado.'
      );
      authLoading(false);
      return;
    }

    if (found.password !== _hashPass(pass)) {
      authError('Senha incorreta.');
      authLoading(false);
      return;
    }

    CURRENT_USER = found;
    localStorage.setItem('ps_session', JSON.stringify({ id: found.id, username: found.username }));
    authLoading(false);
    _rateLimit.reset('login');
    loginSuccess(found);
  } catch (e) {
    authError(_fbConfigured ? _fbErr(e) : (e.message || backendFallbackMessage()));
    authLoading(false);
  }
}

async function doRegister() {
  authClear();
  const farm = getFieldValue('ca-farm', true);
  const user = getFieldValue('ca-user', true);
  const email = getFieldValue('ca-email', true);
  const pass = getFieldValue('ca-pass');
  const region = getFieldValue('ca-region');

  if (!farm || !user || !email || !pass) { authError('Preencha todos os campos.'); return; }
  if (user.length < 3) { authError('Usuário: mínimo 3 caracteres.'); return; }
  if (pass.length < 6) { authError('Senha: mínimo 6 caracteres.'); return; }
  if (!/\S+@\S+\.\S+/.test(email)) { authError('E-mail inválido.'); return; }
  if (/[<>"'&]/.test(user)) { authError('Usuário contém caracteres inválidos.'); return; }
  if (farm.length > 50) { authError('Nome da fazenda muito longo (máx. 50 chars).'); return; }

  try { _rateLimit.check('register', 3, 3_600_000); }
  catch (e) { authError(e.message); return; }

  authLoading(true);
  try {
    if (_fbConfigured) {
      _authResolved = true;
      const newUser = await fbRegister(email, pass, user, farm, region);
      CURRENT_USER = newUser;
      authLoading(false);
      authOk('Conta criada com sucesso. Entrando...');
      loginSuccess(newUser);
      return;
    }

    const users = _localUsers();
    const searchFields = buildUserSearchFields(user, farm);
    if (users.find(u => normalizeSearchText(u.username).replace(/\s+/g, '') === searchFields.username_lower)) {
      authError('Usuário já em uso.');
      authLoading(false);
      return;
    }
    if (users.find(u => normalizeSearchText(u.email) === normalizeSearchText(email))) {
      authError('E-mail já cadastrado.');
      authLoading(false);
      return;
    }

    const localId = 'u' + Date.now();
    const newUser = {
      id: localId,
      uid: localId,
      username: user,
      email,
      password: _hashPass(pass),
      farmName: farm,
      region,
      ...searchFields,
      createdAt: Date.now(),
      avatar: (farm[0] || 'F').toUpperCase()
    };

    users.push(newUser);
    _saveLocalUsers(users);
    CURRENT_USER = newUser;
    localStorage.setItem('ps_session', JSON.stringify({ id: newUser.id, username: newUser.username }));
    authLoading(false);
    authOk(
      backendNeedsNotice()
        ? 'Servidor indisponível. Conta criada em modo local neste dispositivo.'
        : 'Conta criada com sucesso.'
    );
    loginSuccess(newUser);
  } catch (e) {
    authError(_fbConfigured ? _fbErr(e) : (e.message || backendFallbackMessage()));
    authLoading(false);
  }
}

async function loadRankingFromFirestore(filter = 'patrimonio', append = false) {
  if (_rankLoading) return;
  if (!_fbConfigured) {
    _rankError = '';
    _rankCacheFilter = filter;
    return;
  }

  _rankLoading = true;
  _rankCacheFilter = filter;
  _rankError = '';
  const pageState = getRankPageState(filter);
  if (!append) {
    pageState.cursor = null;
    pageState.hasMore = false;
  }

  try {
    const rows = await fbGetRanking(filter, !append);
    const myUid = CURRENT_USER?.uid || CURRENT_USER?.id;
    const mapped = rows.map(r => ({
      ...r,
      farmName: r.farmName || r.farm || 'Fazenda',
      farm: r.farmName || r.farm || 'Fazenda',
      isMe: r.id === myUid,
      flag: r.flag || '🇧🇷'
    }));

    if (append) {
      const existingIds = new Set(_rankCache.map(r => r.id));
      mapped.forEach(r => {
        if (!existingIds.has(r.id)) _rankCache.push(r);
      });
    } else {
      _rankCache = mapped;
    }

    _rankError = '';
    _rankHasMore = pageState.hasMore;
  } catch (e) {
    console.warn('ranking load error', e);
    _rankError = _fbErr(e);
    _rankHasMore = false;
    if (!append) _rankCache = [];
  }

  _rankLoading = false;
  const btn = document.getElementById('rank-load-more');
  if (btn) btn.style.display = _fbConfigured && !_rankError && _rankHasMore ? 'block' : 'none';
}

function getRankingData(filter) {
  if (_fbConfigured) {

  const myUid = me?.id;
  const data = [...RANK_SEED.filter(r => r.id !== myUid)];
  if (me) data.push(me);
  return data.sort((a, b) => (b[filter] || 0) - (a[filter] || 0));
}

  if(sick>0)addNotif('🤒','Alerta sanitário',sick+' animal(is) doente(s) no rebanho!');
  if(G.vetCal.vac<=3)addNotif('💉','Vacinação urgente','Época de vacinar o rebanho chegou!');
  if(G.milkStock>500)addNotif('🥛','Estoque alto',G.milkStock+'L de leite estocados — venda!');
  if(G.money<500)addNotif('💰','Capital baixo','Saldo crítico: '+fmt(G.money));
};

// ── SALVAR CONQUISTAS NO CLOUD SAVE ──────────────────────────
const _origCloudSave = cloudSave;
cloudSave = function(){
  const result = _origCloudSave();
  // Also save achievements
  if(CURRENT_USER)localStorage.setItem('ps_ach_'+(CURRENT_USER.id||CURRENT_USER.uid),JSON.stringify([...unlockedAchievements]));
  return result;
};
const _origLoadCloud = loadCloudSave;
loadCloudSave = function(uid){
  const result = _origLoadCloud(uid);
  try{
    const raw=localStorage.getItem('ps_ach_'+uid);
    if(raw)unlockedAchievements=new Set(JSON.parse(raw));
  }catch{}
  // Populate feed and notifications on load
  setTimeout(()=>{renderGlobalFeed();updateSeasonUI();},500);
  return result;
};

Object.assign(window, {
  doLogin,
  doRegister,
  doRecover,
  doLogout,
  sendFriendRequest,
  searchFriendsLive,
  renderRanking,
  nextDay,
  cloudSave,
  loadCloudSave,
});

</script>
